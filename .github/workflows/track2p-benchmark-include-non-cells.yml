name: Track2p benchmark with non-cell ROIs

on:
  # checkov:skip=CKV_GHA_7: Manual benchmark workflow intentionally exposes bounded dispatch inputs and produces only benchmark artifacts.
  workflow_dispatch:
    inputs:
      data_path:
        description: "Zenodo extraction directory"
        type: string
        default: track2p-data
        required: true
      max_gap:
        description: "Maximum session gap"
        type: string
        default: "2"
        required: true
      run_calibrated_loso:
        description: "Run calibrated leave-one-subject-out variant"
        type: boolean
        default: false
        required: true
      exclude_subjects:
        description: "Comma-separated manual-GT subjects to exclude because their GT ROI index space is incompatible with the public Suite2p subset"
        type: string
        default: jm038,jm039
        required: false
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
        required: true

permissions:
  contents: read

env:
  ZENODO_URL: https://zenodo.org/records/17091226/files/data.zip?download=1
  ZENODO_MD5: 8d12ff6b93a26e28609c5a20b11f3d88
  ZENODO_CACHE_KEY: track2p-zenodo-17091226-data-md5-8d12ff6b93a26e28609c5a20b11f3d88

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install BayesCaTrack
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<3"
          python -m pip install -e .

      - name: Restore Track2p Zenodo archive
        id: restore-data
        uses: actions/cache/restore@v5
        with:
          path: data-cache/data.zip
          key: ${{ env.ZENODO_CACHE_KEY }}

      - name: Download Track2p Zenodo archive on cache miss
        if: steps.restore-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data-cache
          curl --fail --location --show-error --retry 5 --retry-delay 30 --retry-all-errors \
            --output data-cache/data.zip "$ZENODO_URL"

      - name: Verify archive checksum
        run: echo "${ZENODO_MD5}  data-cache/data.zip" | md5sum --check -

      - name: Save Track2p Zenodo archive cache
        if: steps.restore-data.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: data-cache/data.zip
          key: ${{ env.ZENODO_CACHE_KEY }}

      - name: Extract archive
        run: |
          rm -rf "${{ inputs.data_path }}" benchmark-ground-truth-subjects results
          mkdir -p "${{ inputs.data_path }}"
          python -m zipfile -e data-cache/data.zip "${{ inputs.data_path }}"
          du -sh "${{ inputs.data_path }}" || true

      - name: Filter to usable manual-GT subjects
        id: gt
        env:
          DATA_PATH: ${{ inputs.data_path }}
          EXCLUDE_SUBJECTS: ${{ inputs.exclude_subjects }}
          RUN_CALIBRATED_LOSO: ${{ inputs.run_calibrated_loso }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os, shutil
          from pathlib import Path

          root = Path(os.environ["DATA_PATH"])
          out = Path("benchmark-ground-truth-subjects")
          excluded_by_user = {name.strip() for name in os.environ.get("EXCLUDE_SUBJECTS", "").split(",") if name.strip()}
          run_calibrated_loso = os.environ.get("RUN_CALIBRATED_LOSO", "false").lower() == "true"
          min_subjects = 2 if run_calibrated_loso else 1
          if out.exists():
              shutil.rmtree(out)
          out.mkdir()

          def is_subject(path: Path) -> bool:
              if not path.is_dir():
                  return False
              return (path / "track2p").exists() or any(
                  (child / "suite2p" / "plane0").exists()
                  for child in path.iterdir()
                  if child.is_dir()
              )

          subjects = [p for p in root.rglob("*") if is_subject(p)]
          if subjects:
              parent = min((p.parent for p in subjects), key=lambda p: (len(p.parts), str(p)))
              subjects = [p for p in sorted(parent.iterdir()) if is_subject(p)]
          included = []
          excluded_no_gt = []
          excluded_incompatible = []
          for subject in subjects:
              gt = subject / "ground_truth.csv"
              if not gt.exists():
                  excluded_no_gt.append(subject.name)
                  continue
              if subject.name in excluded_by_user:
                  excluded_incompatible.append(subject.name)
                  continue
              target = out / subject.name
              target.mkdir()
              for item in subject.iterdir():
                  if item.name == "ground_truth.csv":
                      continue
                  os.symlink(item.resolve(), target / item.name, target_is_directory=item.is_dir())
              os.symlink(gt.resolve(), target / "ground_truth.csv")
              included.append(subject.name)

          if len(included) < min_subjects:
              raise SystemExit(
                  f"Need at least {min_subjects} usable manual-GT subject(s) after exclusions; "
                  f"included={included}, excluded_incompatible={sorted(excluded_incompatible)}"
              )
          print(f"included={','.join(included)}")
          print(f"excluded_no_gt={','.join(excluded_no_gt)}")
          print(f"excluded_incompatible={','.join(sorted(excluded_incompatible))}")
          PY

      - name: Diagnose manual-GT ROI coverage
        run: |
          mkdir -p results
          python - <<'PY'
          import csv
          from pathlib import Path

          from bayescatrack.experiments.track2p_benchmark import (
              Track2pBenchmarkConfig,
              _load_ground_truth_csv_reference,
              _load_subject_sessions,
              _loaded_suite2p_index_set,
              discover_subject_dirs,
          )

          root = Path("benchmark-ground-truth-subjects")
          config = Track2pBenchmarkConfig(
              data=root,
              method="track2p-baseline",
              reference=root,
              reference_kind="manual-gt",
              include_behavior=False,
              include_non_cells=True,
          )
          rows = []
          for subject_dir in discover_subject_dirs(root):
              reference = _load_ground_truth_csv_reference(
                  subject_dir / "ground_truth.csv", subject_dir=subject_dir
              )
              sessions = _load_subject_sessions(subject_dir, config)
              for session_index, session in enumerate(sessions):
                  available = sorted(_loaded_suite2p_index_set(session))
                  referenced = []
                  for value in reference.suite2p_indices[:, session_index]:
                      if value is None:
                          continue
                      try:
                          referenced.append(int(value))
                      except (TypeError, ValueError):
                          continue
                  referenced = sorted(set(referenced))
                  missing = sorted(set(referenced) - set(available))
                  rows.append(
                      {
                          "subject": subject_dir.name,
                          "session": session.session_name,
                          "session_index": session_index,
                          "referenced_rois": len(referenced),
                          "loaded_rois": len(available),
                          "missing_rois": len(missing),
                          "compatible": str(not missing).lower(),
                          "referenced_max": max(referenced) if referenced else "",
                          "loaded_max": max(available) if available else "",
                          "missing_preview": " ".join(str(value) for value in missing[:20]),
                      }
                  )

          csv_path = Path("results/manual_gt_roi_diagnostics.csv")
          fieldnames = [
              "subject",
              "session",
              "session_index",
              "referenced_rois",
              "loaded_rois",
              "missing_rois",
              "compatible",
              "referenced_max",
              "loaded_max",
              "missing_preview",
          ]
          with csv_path.open("w", encoding="utf-8", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)

          lines = [
              "## Manual-GT ROI diagnostics",
              "",
              "| subject | session | referenced ROIs | loaded ROIs | missing ROIs | compatible |",
              "| --- | --- | ---: | ---: | ---: | --- |",
          ]
          for row in rows:
              lines.append(
                  "| {subject} | {session} | {referenced_rois} | {loaded_rois} | {missing_rois} | {compatible} |".format(
                      **row
                  )
              )
          Path("results/manual_gt_roi_diagnostics.md").write_text(
              "\n".join(lines) + "\n", encoding="utf-8"
          )
          PY

      - name: Add diagnostics to job summary
        run: cat results/manual_gt_roi_diagnostics.md >> "$GITHUB_STEP_SUMMARY"

      - name: Run Track2p baseline
        run: |
          bayescatrack benchmark track2p \
            --data benchmark-ground-truth-subjects \
            --reference benchmark-ground-truth-subjects \
            --reference-kind manual-gt \
            --include-non-cells \
            --method track2p-baseline \
            --format csv \
            --output results/track2p_baseline.csv

      - name: Run registered-IoU global assignment
        run: |
          bayescatrack benchmark track2p \
            --data benchmark-ground-truth-subjects \
            --reference benchmark-ground-truth-subjects \
            --reference-kind manual-gt \
            --include-non-cells \
            --method global-assignment \
            --cost registered-iou \
            --max-gap "${{ inputs.max_gap }}" \
            --format csv \
            --output results/global_registered_iou_gap${{ inputs.max_gap }}.csv

      - name: Run ROI-aware global assignment
        run: |
          bayescatrack benchmark track2p \
            --data benchmark-ground-truth-subjects \
            --reference benchmark-ground-truth-subjects \
            --reference-kind manual-gt \
            --include-non-cells \
            --method global-assignment \
            --cost roi-aware \
            --max-gap "${{ inputs.max_gap }}" \
            --weighted-masks \
            --weighted-centroids \
            --format csv \
            --output results/global_roi_aware_gap${{ inputs.max_gap }}.csv

      - name: Run calibrated LOSO global assignment
        if: inputs.run_calibrated_loso
        run: |
          bayescatrack benchmark track2p \
            --data benchmark-ground-truth-subjects \
            --reference benchmark-ground-truth-subjects \
            --reference-kind manual-gt \
            --include-non-cells \
            --method global-assignment \
            --cost calibrated \
            --split leave-one-subject-out \
            --max-gap "${{ inputs.max_gap }}" \
            --format csv \
            --output results/global_calibrated_loso_gap${{ inputs.max_gap }}.csv

      - name: Aggregate benchmark comparison
        env:
          MAX_GAP: ${{ inputs.max_gap }}
          RUN_LOSO: ${{ inputs.run_calibrated_loso }}
        run: |
          args=(
            --input "Track2p=results/track2p_baseline.csv"
            --input "Global-IoU=results/global_registered_iou_gap${MAX_GAP}.csv"
            --input "ROI-aware=results/global_roi_aware_gap${MAX_GAP}.csv"
          )
          if [[ "$RUN_LOSO" == "true" ]]; then
            args+=(--input "Calibrated-LOSO=results/global_calibrated_loso_gap${MAX_GAP}.csv")
          fi
          bayescatrack benchmark compare "${args[@]}" --output results/comparison.md
          bayescatrack benchmark compare "${args[@]}" --format csv --output results/comparison.csv

      - name: Add results to job summary
        run: |
          {
            echo "## Track2p benchmark with non-cell ROIs"
            echo "Included usable manual-GT subjects: ${{ steps.gt.outputs.included }}"
            echo "Excluded subjects without GT: ${{ steps.gt.outputs.excluded_no_gt }}"
            echo "Excluded GT subjects with incompatible public ROI indices: ${{ steps.gt.outputs.excluded_incompatible }}"
            echo "include_non_cells: true"
            echo "run_calibrated_loso: ${{ inputs.run_calibrated_loso }}"
            cat results/comparison.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always() && hashFiles('results/**') != ''
        uses: actions/upload-artifact@v5
        with:
          name: track2p-benchmark-include-non-cells-gap${{ inputs.max_gap }}
          path: results/
          if-no-files-found: error
